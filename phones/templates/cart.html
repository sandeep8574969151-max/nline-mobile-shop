{% load static %}
<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Your Cart</title>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2>Shopping Cart</h2>
        <table class="table bg-white shadow-sm">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.phone.name }}</td>
                    <td>₹{{ item.phone.price }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>₹{{ item.phone.price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <h4 class="text-end">Grand Total: ₹{{ total_price }}</h4>
        <button class="btn btn-success float-end">Checkout</button>
    </div>
</body>

</html>
