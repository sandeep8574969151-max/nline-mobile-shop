{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Signup - 91mobiles Clone</title>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .signup-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-orange {
            background-color: #ff6f00;
            color: white;
            font-weight: bold;
            width: 100%;
        }

        .btn-orange:hover {
            background-color: #e66400;
            color: white;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <div class="text-center mb-4">
            <a href="/"><img src="{% static 'images/logo.png' %}" alt="91mobiles" height="35"></a>
            <h4 class="mt-3 fw-bold">Create Account</h4>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-orange mt-3">SIGN UP</button>
        </form>

        <div class="text-center mt-3 small">
            Already have an account? <a href="#" class="text-decoration-none">Login here</a>
        </div>
    </div>
</body>

</html>
